name: Nightly security monitor

on:
  schedule:
    # 5:00 AM Madrid time (3:00 UTC in summer CEST, 4:00 UTC in winter CET)
    - cron: "0 3 * * *"
  workflow_dispatch: # manual trigger

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  curate-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - run: pip install -r requirements.txt

      - name: Curate security news
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python curate.py

      - name: Build static site
        run: python build.py

      - name: Commit data and site
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ docs/ 2>/dev/null || true
          git diff --cached --quiet || git commit -m "nightly: $(date -u '+%Y-%m-%d %H:%M') UTC"
          git push

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
        with:
          artifact_name: github-pages
        if: false  # Enable after configuring Pages in repo settings

      # Alternative: deploy from /docs folder
      # Configure in repo Settings > Pages > Source: Deploy from branch > /docs
